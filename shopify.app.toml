name = "PLP SEO Generator"
client_id = "8377d5035a781fb80c50514965fea6ac"
application_url = "https://lizard-shut-exceeding.ngrok-free.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = "read_products,write_products,read_content,write_content"

[auth]
redirect_urls = [
  "https://lizard-shut-exceeding.ngrok-free.dev/auth/callback",
  "https://lizard-shut-exceeding.ngrok-free.dev/auth/shopify/callback",
  "https://lizard-shut-exceeding.ngrok-free.dev/api/auth/callback",
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"
